    <title>Help for Enable Globally</title>
</head>
<body>
If enabled, folder properties will be automatically injected into the environment and made available across all
pipeline sections, including the <em>parameters</em> block. This allows you to reference folder properties in pipeline
parameters without needing to explicitly call <em>withFolderProperties</em>.
</body>
